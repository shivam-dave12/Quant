<!doctype html>
<html><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>Institutional Command Center</title><link rel="stylesheet" href="/assets/styles.css"/></head>
<body><div class="app">
<header><div><h1>Institutional Multi-Asset Command Center</h1><p>Read-only sidecar dashboard. No strategy/core mutation.</p></div><div class="top"><span id="status" class="pill">OFFLINE</span><span id="clock" class="pill">--</span></div></header>
<section id="summary" class="summary"></section>
<nav><button data-tab="overview" class="active">Overview</button><button data-tab="assets">Asset Desks</button><button data-tab="positions">Positions</button><button data-tab="risk">Risk / Alerts</button><button data-tab="tape">Event Tape</button></nav>
<main>
<section id="overview" class="tab active"><div class="grid2"><div class="panel"><h2>Portfolio PnL Curve</h2><canvas id="pnlChart"></canvas></div><div class="panel"><h2>Asset Price Matrix</h2><canvas id="priceChart"></canvas></div></div><div id="heatmap" class="heatmap"></div></section>
<section id="assets" class="tab"><div class="toolbar"><input id="assetFilter" placeholder="Filter asset/symbol..."/></div><div id="assetGrid" class="cards"></div></section>
<section id="positions" class="tab"><div id="positionGrid" class="cards"></div><div class="panel"><h2>R / MFE Monitor</h2><canvas id="rChart"></canvas></div></section>
<section id="risk" class="tab"><div class="grid2"><div class="panel"><h2>Spread / Cost Impairment</h2><canvas id="spreadChart"></canvas></div><div class="panel"><h2>Alerts</h2><div id="alerts" class="list"></div></div></div></section>
<section id="tape" class="tab"><div class="panel"><h2>Event Tape</h2><div id="events" class="list"></div></div></section>
</main></div><script src="/assets/app.js"></script></body></html>
